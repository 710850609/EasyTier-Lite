name: Build Multi-Platform

on:
  push:
    branches: [main1, master1]
    tags: ['pre/*']
  pull_request:
    branches: [main1, master1]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.8'
  PYTHONIOENCODING: 'utf-8'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Windows x64
        run: |
          cd src/backend
          python build.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierLite-Server-windows-x64
          path: src/backend/dist/*.zip

  build-linux-x64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Linux x64
        run: |
          cd src/backend
          python build.py

      - name: Upload Linux x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierLite-Server-linux-x64
          path: src/backend/dist/*.zip

  build-linux-arm64:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Linux ARM64 with manylinux_2_28
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            quay.io/pypa/manylinux_2_28_aarch64:latest \
            bash -c "
              ln -sf /opt/python/cp38-cp38/bin/python /usr/local/bin/python3 && \
              ln -sf /opt/python/cp38-cp38/bin/pip /usr/local/bin/pip && \
              export PATH=/opt/python/cp38-cp38/bin:$PATH && \
              cd src/backend && \
              python3 build.py
            "

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierLite-Server-linux-arm64
          path: src/backend/dist/*.zip

  build-macos-x64:
    needs: build-frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up PyObjC
        run: |
          # 安装Python 3.8 支持的最高版本是 10.3, 避免不兼容
          pip install pyobjc==10.3

      - name: Build macOS x64
        run: |
          cd src/backend
          python build.py

      - name: Upload macOS x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyTierLite-Server-macos-x64
          path: src/backend/dist/*.zip

  release:
    needs: [build-windows, build-linux-x64, build-linux-arm64, build-macos-x64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/EasyTierLite-Server-windows-x64/*.zip
            artifacts/EasyTierLite-Server-linux-x64/*.zip
            artifacts/EasyTierLite-Server-linux-arm64/*.zip
            artifacts/EasyTierLite-Server-macos-x64/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
