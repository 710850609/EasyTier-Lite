name: Build App

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: '构建 Windows (AMD64)'
        type: boolean
        default: true
      build_linux_amd64:
        description: '构建 Linux (AMD64)'
        type: boolean
        default: true
      build_linux_arm64:
        description: '构建 Linux (ARM64)'
        type: boolean
        default: true
      build_linux_riscv64:
        description: '构建 Linux (RISC-V 64)'
        type: boolean
        default: false
      build_macos_x64:
        description: '构建 macOS (x86_64, Intel)'
        type: boolean
        default: true
      build_macos_arm64:
        description: '构建 macOS (ARM64, Apple Silicon)'
        type: boolean
        default: false

env:
#  PYTHON_VERSION: '3.9.13'
  PYTHON_VERSION: '3.12'

permissions:
  contents: write

jobs:
  build-info:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release-info.outputs.prerelease }}
      version: ${{ steps.release-info.outputs.version }}
      release_notes: ${{ steps.release-info.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Release Version And Notes
        id: release-info
        run: |
          chmod +x version-util.sh
          
          # 获取 easytier 版本号，转义为子版本号
          min_et_version='2.5.0'
          fetch_url="https://api.github.com/repos/EasyTier/EasyTier/releases/latest"
          latest_release=$(curl -s "${fetch_url}") 
          if [ -z "$latest_release" ]; then
            echo "获取最新EasyTier版本信息失败"
            exit 1
          fi
          # 提取版本号
          et_version=$(echo "$latest_release" | jq -r .tag_name | sed 's/^v//' )
          # 检查版本是否符合要求
          if [[ "$et_version" < "${min_et_version}" ]]; then
            echo "EasyTier release 版本 $et_version 过低，使用最低构建版本 ${min_et_version}"
            et_version="${min_et_version}"
          fi
          et_version_raw=$(version-util.sh -x "$et_version")
          echo "转换 easytier 版本 ${$et_version} 为 ${et_version_raw}"
          
          CHANGE_LOG_FILE="${{ github.workspace }}/CHANGELOG.md"
          CHANGE_VER=$(awk '/^## / {print $2; exit}' "${CHANGE_LOG_FILE}")
          if [[ -z "${CHANGE_VER}" ]]; then
            # 如果第一个出现的版本号为空，则取第二个版本号
            CHANGE_VER=$(awk '/^## / {c++; if(c==2) {print $2; exit}}' "${CHANGE_LOG_FILE}")
          fi
          
          
          prerelease='true'
          version="${CHANGE_VER}.${et_version_raw}"
          if git ls-remote --tags origin "refs/tags/$CHANGE_VER*" | grep -q .; then
            echo "存在 $CHANGE_VER 开头的 tag"
            version="${version}-$(date +'%Y%m%d%H%M%S')"
          else
            echo "不存在 $CHANGE_VER 开头的 tag"
            prerelease='false'
          fi
          awk -v ver="$CHANGE_VER" '
                $0 ~ "^## " ver { found=1; next }
                found && $0 ~ "^## " { exit }
                found { print }
              ' "${CHANGE_LOG_FILE}" > release_notes.txt
          # 检查是否提取到内容
          if [ ! -s release_notes.txt ]; then
              echo "- 测试版本" > release_notes.txt
          fi
          
          echo '是否正式版: '$([[ "$prerelease" == "false" ]] && echo "是" || echo "否")
          echo "构建版本: ${version}"            
          echo "变更日志: $(cat release_notes.txt)"            
          
          echo "prerelease=${prerelease}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT
          {
            echo "release_notes<<EOF"
            cat release_notes.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-windows-amd64:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Upgrade pip
        run: python.exe -m pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build
        run: cd backend && python build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: backend/dist/*.zip

  build-linux-amd64:
    if: ${{ github.event.inputs.build_linux_amd64 == 'true' }}
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build
        run: cd backend && python3 build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: backend/dist/*.zip

  build-linux-arm64:
    if: ${{ github.event.inputs.build_linux_arm64 == 'true' }}
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            python:${{ env.PYTHON_VERSION }}-slim \
            bash -c "
              export PIP_ROOT_USER_ACTION=ignore
              apt-get update && apt-get install -y binutils &&
              pip install --upgrade pip &&
              cd backend &&
              python3 build.py
            "
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: backend/dist/*.zip

  build-linux-riscv64:
    if: ${{ github.event.inputs.build_linux_riscv64 == 'true' }}
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build in RISC-V64 container
        run: |
          docker run --rm --platform linux/riscv64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            riscv64/python \
            bash -c "
              export PIP_ROOT_USER_ACTION=ignore
              apt-get update && apt-get install -y binutils &&
              pip install --upgrade pip &&
              cd backend &&
              python3 build.py
            "
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-riscv64
          path: backend/dist/*.zip

  build-macos-amd64:
    if: ${{ github.event.inputs.build_macos_x64 == 'true' }}
    needs: build-frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (x86_64)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: 'x64'
      - name: Upgrade pip (x86_64)
        run: arch -x86_64 pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build (x86_64)
        run: |
          cd backend
          arch -x86_64 python3 build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: backend/dist/*.zip

  build-macos-arm64:
    if: ${{ github.event.inputs.build_macos_arm64 == 'true' }}
    needs: build-frontend
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build
        run: cd backend && python3 build.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: backend/dist/*.zip

  release:
    needs:
      - build-info
      - build-windows-amd64
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-riscv64
      - build-macos-amd64
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*.zip
            artifacts/*/*.fpk
          name: ${{ needs.build-info.outputs.version }}
          tag_name: ${{ needs.build-info.outputs.version }}
          draft: ${{ needs.build-info.outputs.prerelease == 'true' }}
          prerelease: ${{ needs.build-info.outputs.prerelease == 'true' }}
          body: ${{ needs.build-info.outputs.release_notes }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}