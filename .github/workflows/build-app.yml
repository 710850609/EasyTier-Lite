name: Build App

on:
  workflow_dispatch:
    inputs:
      build_windows:
        description: '构建 Windows (AMD64)'
        type: boolean
        default: true
      build_linux_amd64:
        description: '构建 Linux (AMD64)'
        type: boolean
        default: true
      build_linux_arm64:
        description: '构建 Linux (ARM64)'
        type: boolean
        default: true
      build_linux_riscv64:
        description: '构建 Linux (RISC-V 64)'
        type: boolean
        default: false
      build_macos_x64:
        description: '构建 macOS (x86_64, Intel)'
        type: boolean
        default: true
      build_macos_arm64:
        description: '构建 macOS (ARM64, Apple Silicon)'
        type: boolean
        default: false

env:
#  PYTHON_VERSION: '3.9.13'
  PYTHON_VERSION: '3.12'

permissions:
  contents: write

jobs:
  build-info:
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.release-info.outputs.prerelease }}
      version: ${{ steps.release-info.outputs.version }}
      et_ver: ${{ steps.release-info.outputs.et_ver }}
      release_notes: ${{ steps.release-info.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Release Version And Notes
        id: release-info
        run: |          
          if [[ -f "./build-info.sh" || -f "./version-util.sh" ]]; then
            chmod +x version-util.sh
            chmod +x build-info.sh
          
            source build-info.sh "unknown" "unknown" "unknown" "unknown"
            # 从脚本获取实际计算后的值（注意大小写）
            et_ver="${ET_VER}"
            build_ver="${BUILD_VER}"
            release_notes="${CHANGE_NOTES}"
            prerelease="${PRE_RELEASE}"
          else
            echo "错误：build-info.sh 或 version-util.sh 不存在" >&2
            exit 1
          fi
          
          echo '是否正式版: '$([[ "${prerelease}" == "false" ]] && echo "是" || echo "否")
          echo "内置 EasyTier 版本: ${et_ver}"            
          echo "构建版本: ${build_ver}"            
          echo "变更日志: ${release_notes}"
          
          echo "prerelease=${prerelease}" >> $GITHUB_OUTPUT
          echo "et_ver=${et_ver}" >> $GITHUB_OUTPUT
          echo "version=${build_ver}" >> $GITHUB_OUTPUT
          {
            echo "release_notes<<GH_OUTPUT_EOF"
            echo "$release_notes"
            echo "GH_OUTPUT_EOF"
          } >> $GITHUB_OUTPUT


  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Build frontend
        run: cd frontend && npm run build
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-windows-amd64:
    if: ${{ github.event.inputs.build_windows == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Upgrade pip
        run: python.exe -m pip install --upgrade pip

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build
        run: cd backend && python build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --github_proxy_url ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: backend/dist/*.zip

  build-linux-amd64:
    if: ${{ github.event.inputs.build_linux_amd64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build
        run: cd backend && python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --github_proxy_url ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: backend/dist/*.zip

  build-linux-arm64:
    if: ${{ github.event.inputs.build_linux_arm64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build in ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e ET_VER=${{ needs.build-info.outputs.et_ver }} \
            python:${{ env.PYTHON_VERSION }}-slim \
            bash -c '
              export PIP_ROOT_USER_ACTION=ignore
              apt-get update && apt-get install -y binutils &&
              pip install --upgrade pip &&
              cd backend &&
              python3 build.py --et_ver "${ET_VER}" --github_proxy_url ""
            '
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: backend/dist/*.zip

  build-linux-riscv64:
    if: ${{ github.event.inputs.build_linux_riscv64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: riscv64
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build in RISC-V64 container
        run: |
          docker run --rm --platform linux/riscv64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e ET_VER=${{ needs.build-info.outputs.et_ver }} \
            riscv64/python \
            bash -c '
              export PIP_ROOT_USER_ACTION=ignore
              apt-get update && apt-get install -y binutils &&
              pip install --upgrade pip &&
              cd backend &&
              python3 build.py --et_ver "${ET_VER}" --github_proxy_url ""
            '
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-riscv64
          path: backend/dist/*.zip

  build-macos-amd64:
    if: ${{ github.event.inputs.build_macos_x64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (x86_64)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: 'x64'
      - name: Upgrade pip (x86_64)
        run: arch -x86_64 pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build (x86_64)
        run: |
          cd backend
          arch -x86_64 python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --github_proxy_url ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64
          path: backend/dist/*.zip

  build-macos-arm64:
    if: ${{ github.event.inputs.build_macos_arm64 == 'true' }}
    needs: [ build-frontend, build-info ]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: arm64
      - name: Upgrade pip
        run: pip install --upgrade pip
      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Build
        run: cd backend && python3 build.py --et_ver "${{ needs.build-info.outputs.et_ver }}" --github_proxy_url ""
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: backend/dist/*.zip

  release:
    needs:
      - build-info
      - build-windows-amd64
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-riscv64
      - build-macos-amd64
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*/*.zip
            artifacts/*/*.fpk
          name: ${{ needs.build-info.outputs.version }}
          tag_name: ${{ needs.build-info.outputs.version }}
          draft: ${{ needs.build-info.outputs.prerelease == 'true' }}
          prerelease: ${{ needs.build-info.outputs.prerelease == 'true' }}
          body: ${{ needs.build-info.outputs.release_notes }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}