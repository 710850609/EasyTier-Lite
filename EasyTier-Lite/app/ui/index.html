<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器状态表</title>
    <style>
        /* 基础样式 */
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            font-size: 16px; /* 调大字体 */
        }
        
        /* 表格容器，添加水平滚动 */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 800px; /* 确保表格有最小宽度 */
            border: 1px solid #ddd;
            font-size: 16px; /* 调大表格字体 */
        }
        
        th, td {
            text-align: left;
            padding: 10px; /* 增加内边距 */
            border-bottom: 1px solid #ddd;
            white-space: nowrap; /* 防止文本换行 */
        }
        
        th {
            background-color: #f2f2f2;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        
        /* 固定首列 */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            background-color: #f2f2f2;
            z-index: 2;
            font-weight: bold;
        }
        
        /* 确保首列在hover时保持背景色 */
        tr:hover td:first-child {
            background-color: #f5f5f5;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .local {
            color: blue;
            font-weight: bold;
        }
        
        .direct {
            color: green;
            font-weight: bold;
        }
        
        /* 响应式样式 */
        @media (max-width: 768px) {
            body {
                margin: 5px;
                font-size: 16px;
            }
            
            table {
                font-size: 16px;
            }
            
            th, td {
                padding: 8px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }
            
            table {
                font-size: 14px;
            }
            
            th, td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="table-container">
        <table id="serverTable">
            <thead>
                <tr id="tableHeader">
                    <!-- 表头将通过JavaScript动态生成 -->
                </tr>
            </thead>
            <tbody>
                <!-- 数据将通过JavaScript动态填充 -->
            </tbody>
        </table>
    </div>

    <script>
        // 模拟API接口地址（实际使用时替换为真实接口）
        const API_URL = '/cgi/ThirdParty/EasyTier-Lite/api.cgi/';
        
        // 备用数据（当API调用失败时使用）
        const fallbackData = [
        {
            "cidr": "10.0.0.0/24",
            "ipv4": "10.0.0.0",
            "hostname": "FeiNiu",
            "cost": "Local",
            "lat_ms": "-",
            "loss_rate": "-",
            "rx_bytes": "-",
            "tx_bytes": "-",
            "tunnel_proto": "-",
            "nat_type": "Restricted",
            "id": "1470628219",
            "version": "2.5.0-88a45d11"
        },{"cidr": "10.0.0.0/24", "ipv4": "10.0.0.0", "hostname": "FeiNiu", "cost": "Local", "lat_ms": "-", "loss_rate": "-", "rx_bytes": "-", "tx_bytes": "-", "tunnel_proto": "-", "nat_type": "Restricted", "id": "1470628219", "version": "2.5.0-88a45d11"}, {"cidr": "", "ipv4": "", "hostname": "tencent-vm", "cost": "p2p", "lat_ms": "40.73", "loss_rate": "2.0%", "rx_bytes": "18.07 MB", "tx_bytes": "3.46 MB", "tunnel_proto": "BodyUrls-tcp://et.sbgov.cn:11010,BodyUrls-tcp://et3.sbgov.cn:11010", "nat_type": "Unknown", "id": "3677262003", "version": "2.4.5-4c4d172e"}, {"cidr": "", "ipv4": "", "hostname": "zheyimiaowangluo", "cost": "p2p", "lat_ms": "61.16", "loss_rate": "0.0%", "rx_bytes": "224.94 kB", "tx_bytes": "603.36 kB", "tunnel_proto": "BodyUrls-tcp://et2.sbgov.cn:11010", "nat_type": "Restricted", "id": "150136517", "version": "2.4.5-4c4d172e"},
        ];

        const keyMap = {
            "cidr": "网段",
            "ipv4": "虚拟IPv4",
            "hostname": "主机名",
            "cost": "穿透方式",
            "nat_type": "Nat类型",
            "lat_ms": "延迟",
            "loss_rate": "丢包率",
            "rx_bytes": "下载", 
            "tx_bytes": "上传",
            "tunnel_proto": "协议",
            "id": "id",
            "version": "内核版本"
        };
        const valueMap = {
            "cost": {
                "Local": "本地",
                "p2p": "直连",
            },
            "nat_type": {
                "Unknown" : "未知",
                "OpenInternet" : "开放互联网",
                "NoPAT" : "公网NoPAT",
                "FullCone" : "Nat1全锥",
                "Restricted" : "Nat2受限",
                "PortRestricted" : "Nat3端口受限",
                "Symmetric" : "Nat4对称",
            }
        };
        const classNameMap = {
            "cost": {
                "Local": "local",
                "p2p": "direct",
            },
        };

        // 生成表头函数
        function generateTableHeader() {
            const headerRow = document.querySelector('#tableHeader');
            headerRow.innerHTML = '';
            
            Object.keys(keyMap).forEach(key => {
                if (['id', 'cidr'].indexOf(key) > -1) {
                    return;
                }
                const th = document.createElement('th');
                th.textContent = keyMap[key];
                headerRow.appendChild(th);
            });
        }

         function sortPeer(data) {
            const sorted = data.sort((a, b) => {
                const hasIpA = a.ipv4 && a.ipv4.trim() !== '';
                const hasIpB = b.ipv4 && b.ipv4.trim() !== '';
                
                // ipv4 空的放最后
                if (!hasIpA && !hasIpB) return 0;
                if (!hasIpA) return 1;
                if (!hasIpB) return -1;
                
                // 有 ipv4 的按数值升序
                return a.ipv4 > b.ipv4;
            });
        }

        // 填充表格函数
        function populateTable(data) {
            sortPeer(data);
            const tableBody = document.querySelector('#serverTable tbody');
            // 清空表格
            tableBody.innerHTML = '';
            
            data.forEach(server => {
                const row = document.createElement('tr');
                // 遍历服务器数据的每个属性
                Object.keys(keyMap).forEach((key, index) => {
                    if (['id', 'cidr'].indexOf(key) > -1) {
                        return;
                    }
                    const cell = document.createElement('td');
                    cell.textContent = valueMap[key]?.[server[key]] || server[key];
                    cell.className = classNameMap[key]?.[server[key]] || server[key];
                    row.appendChild(cell);
                });
                
                // 添加操作列
                const actionCell = document.createElement('td');
                row.appendChild(actionCell);
                tableBody.appendChild(row);
            });
        }

        // 从API获取数据
        async function fetchServerData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) {
                    throw new Error('API调用失败');
                }
                const data = await response.json();
                // data = fallbackData;
                console.log(data)
                populateTable(data.data);
            } catch (error) {
                console.error('获取数据失败:', error);
                // 使用备用数据
                populateTable(fallbackData);
            }
        }

        // 初始化页面
        generateTableHeader();
        fetchServerData();
        
        // 定时刷新数据（每30秒）
        setInterval(fetchServerData, 1000);
    </script>
</body>
</html>
